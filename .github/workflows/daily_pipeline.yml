name: Aanya Sharma — Daily Content Pipeline

on:
  # Run daily at 12:30 AM UTC = 06:00 AM IST
  schedule:
    - cron: "30 0 * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - post-only
          - analytics
          - status

  # Also run on push to main (for testing)
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - "orchestrator.py"

jobs:
  # ─── Full Daily Pipeline ──────────────────────────────────────────
  daily-pipeline:
    name: Daily Content Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p output/images output/videos output/captions
          mkdir -p data/trends data/content_queue data/analytics
          mkdir -p logs

      - name: Restore Google Drive credentials
        if: env.GDRIVE_CREDENTIALS != ''
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: |
          echo "$GDRIVE_CREDENTIALS" > gdrive_credentials.json

      - name: Restore YouTube credentials
        if: env.YOUTUBE_CLIENT_SECRET != ''
        env:
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          echo "$YOUTUBE_CLIENT_SECRET" > client_secret.json

      - name: Restore YouTube OAuth token
        if: env.YOUTUBE_CREDS_PICKLE != ''
        env:
          YOUTUBE_CREDS_PICKLE: ${{ secrets.YOUTUBE_CREDS_PICKLE }}
        run: |
          echo "$YOUTUBE_CREDS_PICKLE" | base64 --decode > data/youtube_creds.pickle

      - name: Run Full Pipeline
        if: github.event.inputs.mode == 'full' || github.event.inputs.mode == ''
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          TIMEZONE: "Asia/Kolkata"
        run: python orchestrator.py

      - name: Post Due Items Only
        if: github.event.inputs.mode == 'post-only'
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python orchestrator.py --post-only

      - name: Run Analytics Only
        if: github.event.inputs.mode == 'analytics'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python orchestrator.py --analytics

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aanya-output-${{ github.run_number }}
          path: |
            output/
            data/content_queue/
            data/analytics/analytics_latest.json
            logs/
          retention-days: 7

      - name: Save YouTube credentials back
        if: always() && env.YOUTUBE_CREDS_PICKLE != ''
        env:
          YOUTUBE_CREDS_PICKLE: ${{ secrets.YOUTUBE_CREDS_PICKLE }}
        run: |
          if [ -f "data/youtube_creds.pickle" ]; then
            echo "YouTube credentials updated"
          fi

  # ─── Poster Job (runs every 2 hours to check due posts) ──────────
  post-check:
    name: Check & Post Due Content
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Run every 2 hours
    # (separate trigger defined here for clarity)
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Post due items
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: python orchestrator.py --post-only

  # ─── Weekly Analytics Job ─────────────────────────────────────────
  weekly-analytics:
    name: Weekly Analytics Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Every Sunday at 10 PM UTC = Monday 3:30 AM IST
    # (separate cron in separate workflow recommended for production)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'analytics'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run Analytics
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python orchestrator.py --analytics
      - uses: actions/upload-artifact@v4
        with:
          name: analytics-report-${{ github.run_number }}
          path: data/analytics/
          retention-days: 30
